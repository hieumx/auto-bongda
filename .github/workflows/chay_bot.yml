name: Tự Động Săn Link Bóng Đá Hằng Ngày

on:
  schedule:
    # Chạy tự động 3 tiếng 1 lần
    - cron: '0 */3 * * *'
  workflow_dispatch: # Nút bấm chạy bằng tay

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kéo mã nguồn về máy chủ
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt vũ khí Playwright & Requests
      run: |
        pip install playwright requests
        playwright install chromium

    - name: Kích hoạt Siêu Bot đi săn link
      # Chữ -u cực kỳ quan trọng để GitHub không bị "nuốt log"
      run: python -u san_link_bong_da.py

    - name: Đẩy file m3u mới lên kho chứa công khai
      run: |
        git config --global user.name "actions-user"
        git config --global user.email "actions@github.com"
        git add tong_hop_bong_da.m3u
        git commit -m "Cập nhật luồng trực tiếp mới nhất" || echo "Không có thay đổi"
        git pull --rebase origin main
        git push origin main
