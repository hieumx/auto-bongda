name: Tự Động Săn Link Bóng Đá Hằng Ngày

on:
  schedule:
    # Chạy tự động vào 18h30 (giờ VN) hằng ngày (11h30 UTC)
    - cron: '30 11 * * *'
  workflow_dispatch: # Nút bấm chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cài đặt Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt vũ khí Playwright và Stealth
      run: |
        pip install playwright playwright-stealth
        playwright install chromium

    - name: Kích hoạt Siêu Bot đi săn link (Vượt rào Proxy)
      env:
        PROXY_IP: ${{ secrets.PROXY_IP }}
        PROXY_PORT: ${{ secrets.PROXY_PORT }}
        PROXY_USER: ${{ secrets.PROXY_USER }}
        PROXY_PASS: ${{ secrets.PROXY_PASS }}
      run: python san_link_bong_da.py

    - name: Đóng gói và đẩy lên mây
      run: |
        git config --global user.name "actions-user"
        git config --global user.email "actions@github.com"
        git add tong_hop_bong_da.m3u
        git commit -m "Cập nhật luồng trực tiếp mới nhất" || echo "Không có thay đổi"
        git push
